name: Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  tests:
    name: Flutter ${{ matrix.flutter-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        flutter-version: ['3.19.x', '3.27.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Format
        run: dart format .

      - name: Run tests
        run: flutter test
